services:
  db:
    image: postgres:17
    container_name: my_project_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 8044
      POSTGRES_DB: my_project_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_project_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: my_project_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8000"
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data: